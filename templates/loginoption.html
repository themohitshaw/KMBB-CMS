    .login-heading {
        text-align: center;

        background: linear-gradient(135deg, rgb(252, 100, 44), rgb(255, 140, 80));
    }

    /* 🔥 Hover Effect */
    .login-option-div a:hover {
        transform: scale(1.07);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);

    }

    @media screen and (max-width: 600px) {
