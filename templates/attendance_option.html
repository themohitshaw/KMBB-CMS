{% extends "base.html" %}
{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        font-family: 'Segoe UI', sans-serif;
    }

    .attendance-wrapper {
        min-height: 85vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
    }

    .attendance-card {
        background: rgba(255, 255, 255, 0.95);
        padding: 50px 40px;
        border-radius: 20px;
        width: 100%;
        max-width: 600px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        animation: fadeIn 0.6s ease;
    }

    .attendance-card h2 {
        margin-bottom: 40px;
        font-weight: bold;
        color: #0f2027;
    }

    .attendance-btn {
        width: 100%;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 500;
        transition: 0.3s ease;
        border: none;
    }

    .view-btn {
        background-color: #198754;
        color: white;
    }

    .view-btn:hover {
        background-color: #146c43;
    }

    .take-btn {
        background-color: #0d6efd;
        color: white;
    }

    .take-btn:hover {
        background-color: #084298;
    }

    .update-btn {
        background-color: #ffc107;
        color: #000;
    }

    .update-btn:hover {
        background-color: #e0a800;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Mobile Responsive */
    @media (max-width: 576px) {
        .attendance-card {
            padding: 35px 20px;
        }

        .attendance-card h2 {
            font-size: 20px;
            margin-bottom: 25px;
        }

        .attendance-btn {
            padding: 12px;
            font-size: 14px;
        }
    }

    .back-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        background-color: rgba(0, 0, 0, 0.3);
        color: white;
        padding: 8px 15px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 500;
        z-index: 1000;
        transition: 0.3s ease;
    }

    .back-btn:hover {
        background-color: #444;
        color: white;
    }
</style>

<div class="attendance-wrapper">

    <a href="{{url_for('select_class_by_teacher')}}" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>

    <div class="attendance-card">
        <h2>📋 Attendance Options</h2>

        <a href="{{ url_for('view_attendance') }}">
            <button class="attendance-btn view-btn">
                👁 View Attendance
            </button>
        </a>

        <a href="{{ url_for('take_attendance', subject_id=subject_id) }}">
            <button class="attendance-btn take-btn">
                📝 Take Attendance
            </button>
        </a>

        <a href="{{ url_for('update_attendance') }}">
            <button class="attendance-btn update-btn">
                ✏ Update Attendance
            </button>
        </a>

    </div>

</div>

{% endblock %}
